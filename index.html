<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX VIP - AUTO</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* MANTIVE O SEU ESTILO ORIGINAL */
        :root { --bg: #0b0b0b; --red: #E50914; --card: #141414; --text: #fff; --border: #222; --yellow: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 15px; z-index: 1000; justify-content: space-between; box-sizing: border-box; }
        .logo { color: var(--red); font-weight: bold; font-size: 22px; }
        .btn-voltar, .btn-red { border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; color: white; }
        .btn-voltar { background: #2a2a2a; }
        .btn-red { background: var(--red); }
        .user-validade { font-size: 10px; color: var(--yellow); text-align: right; }
        #portal-inicio { display: none; padding: 80px 20px; text-align: center; }
        .grid-portal { display: grid; gap: 20px; max-width: 500px; margin: 0 auto; }
        .btn-portal { background: #141414; border: 2px solid #333; border-radius: 15px; padding: 40px; color: white; font-size: 24px; font-weight: 900; }
        #player-area { width: 100%; background: #000; position: sticky; top: 60px; z-index: 900; display: none; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; }
        .folder-item { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--red); cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="background:#141414; padding:20px; border-radius:12px; width:85%; max-width:350px; text-align:center;">
            <h1 style="color:var(--red);">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border:1px solid #333;">
            <input type="password" id="p-l" placeholder="Senha" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border:1px solid #333;">
            <button class="btn-red" id="btn-entrar" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="main-content" style="display:none; padding-top: 60px;">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn-voltar" id="btn-portal-back" style="display:none" onclick="voltarAoPortal()">← INÍCIO</button>
                <div class="logo">CLONEFLIX</div>
            </div>
            <div id="display-validade" class="user-validade"></div>
        </header>

        <div id="portal-inicio">
            <div class="grid-portal">
                <button class="btn-portal" onclick="filtrarPortal('filme')">🎬 FILMES</button>
                <button class="btn-portal" onclick="filtrarPortal('serie')">🍿 SÉRIES</button>
            </div>
        </div>

        <div id="conteudo-app" style="display: none;">
            <div id="player-area">
                <div class="player-wrapper"><video id="main-video" controls playsinline></video></div>
                <div style="padding:10px; background:#111; text-align:right;">
                    <button class="btn-red" onclick="fecharPlayer()">FECHAR PLAYER ×</button>
                </div>
            </div>
            <div id="conteudo-home"></div>
        </div>
    </div>

    <div id="modal-temp" class="modal"><div id="temp-lista"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);

        // API CONFIGURADA PARA O SEU PROJETO
        const MINHA_API_URL = "https://cloneflix-web.vercel.app/api/get-video?url=";

        let bancoDados = [];
        const video = document.getElementById('main-video');
        let hls = null;

        document.getElementById('btn-entrar').onclick = () => {
            document.getElementById('login-container').style.display='none';
            document.getElementById('main-content').style.display='block';
            document.getElementById('portal-inicio').style.display='block';
            carregarDados();
        };

        function carregarDados() {
            onValue(ref(db, 'conteudo'), (s) => {
                bancoDados = [];
                s.forEach(it => { bancoDados.push({...it.val(), id: it.key}); });
            });
        }

        window.filtrarPortal = (tipo) => {
            document.getElementById('portal-inicio').style.display = 'none';
            document.getElementById('conteudo-app').style.display = 'block';
            document.getElementById('btn-portal-back').style.display = 'block';
            renderizarCards(tipo);
        };

        function renderizarCards(tipo) {
            const container = document.getElementById('conteudo-home');
            container.innerHTML = "";
            const filtrados = bancoDados.filter(it => it.tipo === tipo);
            
            filtrados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.margin = "10px";
                card.style.display = "inline-block";
                card.innerHTML = `<img src="${item.capa}"><div class="card-title">${item.nome}</div>`;
                card.onclick = () => {
                    if(item.tipo === 'serie') abrirTemporadas(item);
                    else prepararEIniciar(item.url);
                };
                container.appendChild(card);
            });
        }

        window.prepararEIniciar = (urlOriginal) => {
            // Se não for link direto .m3u8, usa a sua API da Vercel
            const linkFinal = urlOriginal.includes('.m3u8') 
                ? urlOriginal 
                : MINHA_API_URL + encodeURIComponent(urlOriginal);
            
            iniciarPlayer(linkFinal);
        };

        function iniciarPlayer(link) {
            document.getElementById('player-area').style.display = 'block';
            window.scrollTo(0,0);
            if(hls) { hls.destroy(); }
            if(Hls.isSupported()){
                hls = new Hls();
                hls.loadSource(link);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = link;
                video.play();
            }
        }

        window.fecharPlayer = () => {
            video.pause();
            document.getElementById('player-area').style.display = 'none';
        };

        window.voltarAoPortal = () => {
            fecharPlayer();
            document.getElementById('portal-inicio').style.display = 'block';
            document.getElementById('conteudo-app').style.display = 'none';
            document.getElementById('btn-portal-back').style.display = 'none';
        };

        function abrirTemporadas(item) {
            const modal = document.getElementById('modal-temp');
            const lista = document.getElementById('temp-lista');
            lista.innerHTML = `<h2 style="color:white; padding:10px;">${item.nome}</h2>`;
            const linhas = item.url.split('\n');
            linhas.forEach(linha => {
                const parts = linha.split('|');
                const btn = document.createElement('div');
                btn.className = 'folder-item';
                btn.innerHTML = `<span>${parts[0]}</span> <span style="color:var(--red)">▶</span>`;
                btn.onclick = () => { modal.style.display='none'; prepararEIniciar(parts[1]); };
                lista.appendChild(btn);
            });
            modal.style.display = 'block';
        }
    </script>
</body>
</html>
